services:
  postgres:
    image: postgres:16-alpine
    container_name: medidas-pessoais-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medidas_pessoais}
      POSTGRES_USER: ${POSTGRES_USER:-medidas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medidas_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medidas_user} -d ${POSTGRES_DB:-medidas_pessoais}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
