services:
  postgres:
    image: postgres:16-alpine
    container_name: medidas-pessoais-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    image: ghcr.io/kadukessler/medidas-pessoais/backend:${IMAGE_TAG:-latest}
    container_name: medidas-pessoais-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL}
      API_URL: ${API_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  frontend:
    image: ghcr.io/kadukessler/medidas-pessoais/frontend:${IMAGE_TAG:-latest}
    container_name: medidas-pessoais-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
