name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose*.yml'
      - '.github/workflows/**'
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose*.yml'
      - '.github/workflows/**'

env:
  BACKEND_IMAGE: ghcr.io/kadukessler/medidas-pessoais/backend
  FRONTEND_IMAGE: ghcr.io/kadukessler/medidas-pessoais/frontend

jobs:
  lint-and-typecheck:
    name: Lint e Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: |
            backend/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: Instalar dependências (backend)
        run: |
          pnpm install --frozen-lockfile
          pnpm exec prisma generate
        working-directory: backend

      - name: Instalar dependências (frontend)
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Lint (backend)
        run: pnpm run lint
        working-directory: backend

      - name: Lint (frontend)
        run: pnpm run lint
        working-directory: frontend

      - name: Typecheck (backend)
        run: npx tsc --noEmit -p tsconfig.build.json
        working-directory: backend

      - name: Typecheck (frontend)
        run: npx tsc --noEmit -p tsconfig.app.json
        working-directory: frontend

  test:
    name: Testes
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Instalar dependências (backend)
        run: |
          pnpm install --frozen-lockfile
          pnpm exec prisma generate
        working-directory: backend

      - name: Testes unitários
        run: pnpm exec jest --passWithNoTests
        working-directory: backend

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: |
            backend/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: Instalar e buildar (backend)
        run: |
          pnpm install --frozen-lockfile
          pnpm exec prisma generate
          pnpm run build
        working-directory: backend

      - name: Instalar e buildar (frontend)
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  docker:
    name: Build e Push Docker
    runs-on: ubuntu-24.04-arm
    needs: [test, build]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar tags (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build e push (backend)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}

      - name: Gerar tags (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build e push (frontend)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: ${{ steps.meta-frontend.outputs.tags }}

      - name: Limpar versões antigas (backend)
        uses: actions/delete-package-versions@v5
        with:
          package-name: medidas-pessoais/backend
          package-type: container
          min-versions-to-keep: 3
          ignore-versions: ^(latest|v.*)$
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Limpar versões antigas (frontend)
        uses: actions/delete-package-versions@v5
        with:
          package-name: medidas-pessoais/frontend
          package-type: container
          min-versions-to-keep: 3
          ignore-versions: ^(latest|v.*)$
          token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key deploy@"$DEPLOY_HOST" "
            cd /data/projetos/medidas-pessoais &&
            git fetch origin main &&
            git reset --hard origin/main &&
            IMAGE_TAG=$IMAGE_TAG GHCR_TOKEN=$GHCR_TOKEN bash infra/deploy.sh
          "
